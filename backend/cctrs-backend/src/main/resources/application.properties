spring.application.name=cctrs-backend

# ===============================
# ACTIVE PROFILE
# ===============================
spring.profiles.active=prod

# ===============================
# DATABASE — SUPABASE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000

# ===============================
# SQL INITIALIZATION
# ===============================
spring.sql.init.mode=always

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# H2 CONSOLE — DISABLED
# ===============================
spring.h2.console.enabled=false

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.cctrs.backend=DEBUG
logging.level.org.springframework=INFO

# ===============================
# MAIL
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# ERROR DETAILS
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# ===============================
# APP URLS (set these on Clever Cloud)
# BACKEND_URL  = https://app-a2138b56-48d2-4d1a-a28e-1aa8425e9298.cleverapps.io
# FRONTEND_URL = https://carbon-contribution-tracking-system.vercel.app
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}