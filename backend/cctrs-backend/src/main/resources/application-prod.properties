# ===============================
# PROD DATABASE (SUPABASE POOLER — hard-coded)
# prepareThreshold=0 disables server-side prepared statements (required for PgBouncer transaction pooling)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Fail fast — if DB is unreachable at startup, abort immediately
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000

# ===============================
# SQL INITIALIZATION — always run schema.sql on startup
# All statements use CREATE TABLE IF NOT EXISTS — safe and idempotent
# ===============================
spring.sql.init.mode=always

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ===============================
# H2 — PERMANENTLY DISABLED
# ===============================
spring.h2.console.enabled=false