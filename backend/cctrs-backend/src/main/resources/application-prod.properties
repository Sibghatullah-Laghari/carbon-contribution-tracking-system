# ===============================
# PROD DATABASE (SUPABASE POOLER — hard-coded)
# prepareThreshold=0 disables server-side prepared statements (required for PgBouncer transaction pooling)
# ===============================
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.bowjibnflublwammctiv
spring.datasource.password=CCTRSAPP@gmail.com
spring.datasource.driver-class-name=org.postgresql.Driver

# Fail fast — if DB is unreachable at startup, abort immediately
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000

# ===============================
# SQL INITIALIZATION — DISABLED
# Schema is managed via migration scripts, never auto-run
# ===============================
spring.sql.init.mode=never

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ===============================
# H2 — PERMANENTLY DISABLED
# ===============================
spring.h2.console.enabled=false